                    },
                    {

                        desc: "编程是手艺活",
                        link: ""
                    },
                    {
                        title: "学习建议：不要畏惧英文文档",

                    },
                    {
                        title: "学习建议：不要闭门造车",
                        desc: "多交流多提问",
                        link: ""
                    }
                ]
            }
        ];

        // 渲染函数
        function renderCards() {
            const container = document.getElementById('cards');
            let html = '';

            resources.forEach(section => {
                html += `
          <div class="bg-white p-6 rounded-xl shadow-sm card">
            <h2 class="text-xl font-bold text-primary mb-4">${section.category}</h2>
            <div class="space-y-3">
        `;
                section.items.forEach(item => {
                    const linkHtml = item.link ?
                        `<a href="${item.link}" target="_blank" class="text-blue-500 hover:text-blue-700 text-sm mt-1 inline-block transition-colors">👉 查看资源</a>` :
                        '';
                    html += `
            <div class="border-l-4 border-primary pl-3 py-2">
              <h3 class="font-semibold text-gray-800">${item.title}</h3>
              <p class="text-gray-600 text-sm mt-1">${item.desc}</p>
              ${linkHtml}
            </div>
          `;
                });
                html += `
            </div>
          </div>
        `;
            });

            container.innerHTML = html;
        }

        // 页面加载时渲染
        document.addEventListener('DOMContentLoaded', renderCards);
    </script>
